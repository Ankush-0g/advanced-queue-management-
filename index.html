
<!DOCTYPE html>
<html>
<head>
<title>Smart Queue - Login</title>

<style>

/* ===== BACKGROUND ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#1e3a8a,#2563eb,#7c3aed,#9333ea);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:16px;
width:340px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

/* ===== FLOATING INPUT ===== */
.input-box{
position:relative;
margin:20px 0;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
}

.input-box label{
position:absolute;
left:12px;
top:12px;
color:#ddd;
font-size:14px;
transition:0.3s;
pointer-events:none;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
top:-8px;
font-size:12px;
color:#93c5fd;
}

/* ===== PASSWORD TOGGLE ===== */
.toggle{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:14px;
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
position:relative;
}

button:hover{
background:#2563eb;
}

/* ===== LOADING SPINNER ===== */
.spinner{
width:18px;
height:18px;
border:2px solid white;
border-top:2px solid transparent;
border-radius:50%;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* ===== ERROR MESSAGE ===== */
.error{
color:#f87171;
font-size:13px;
margin-top:10px;
display:none;
}

/* ===== SHAKE ANIMATION ===== */
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.shake{
animation:shake 0.3s;
}

/* ===== FOOTER ===== */
.footer{
margin-top:15px;
font-size:14px;
}

a{
color:#93c5fd;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card" id="card">

<div class="logo">🚀 Smart Queue</div>
<h2>Login</h2>

<!-- EMAIL -->
<div class="input-box">
<input type="email" id="email" required placeholder=" ">
<label>Email</label>
</div>

<!-- PASSWORD -->
<div class="input-box">
<input type="password" id="password" required placeholder=" ">
<label>Password</label>
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<!-- BUTTON -->
<button onclick="premiumLogin()" id="btn">
Login
<div class="spinner" id="spinner"></div>
</button>

<!-- ERROR -->
<div class="error" id="error"></div>

<div class="footer">
<p>Don't have an account?  
<a href="register.html">Register</a></p>
</div>

</div>

<script src="app.js"></script>

<script>

// Toggle password
function togglePassword(){
let pass = document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}

// Premium login
async function premiumLogin(){

let btn = document.getElementById("btn");
let spinner = document.getElementById("spinner");
let error = document.getElementById("error");
let card = document.getElementById("card");

error.style.display = "none";
spinner.style.display = "block";
btn.disabled = true;

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(!email || !password){
showError("Fill all fields");
return;
}

try{

let res = await fetch("https://backend-6b1n.onrender.com/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data = await res.json();

if(res.ok){

localStorage.setItem("user_email",email);
localStorage.setItem("role",data.role);

window.location = data.role === "admin" ? "admin.html" : "dashboard.html";

}else{
showError(data.detail || "Login failed");
}

}catch{
showError("Server error");
}

function showError(msg){
spinner.style.display = "none";
btn.disabled = false;
error.innerText = msg;
error.style.display = "block";
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),300);
}

}

</script>

</body>
</html>
