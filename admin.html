
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#1e3a8a,#2563eb,#7c3aed,#9333ea);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:16px;
text-align:center;
width:350px;
}

button{
padding:12px;
width:100%;
margin-top:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>Admin Panel</h2>

<button onclick="nextToken()">Call Next Token</button>

<div id="adminInfo"></div>

<a href="display.html">
<button>Open Live Display</button>
</a>

<button onclick="logout()">Logout</button>

</div>

<script src="app.js"></script>
</body>
</html>
