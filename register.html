
<!DOCTYPE html>
<html>
<head>
<title>Register - Smart Queue</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#1e3a8a,#2563eb,#7c3aed,#9333ea);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:16px;
width:340px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.input-box{
position:relative;
margin:20px 0;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
}

/* 👁 Toggle button */
.toggle{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Account</h2>

<!-- EMAIL -->
<div class="input-box">
<input type="email" id="email" placeholder="Email">
</div>

<!-- PASSWORD WITH TOGGLE 👁 -->
<div class="input-box">
<input type="password" id="password" placeholder="Password">
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<!-- ROLE -->
<div class="input-box">
<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>
</div>

<button onclick="register()">Register</button>

<p>Already have an account? <a href="index.html">Login</a></p>

</div>

<script src="app.js"></script>

<script>

/* 👁 Toggle Password */
function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}
}

</script>

</body>
</html>
